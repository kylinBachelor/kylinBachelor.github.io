user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;


include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    include /etc/nginx/conf.d/*.conf;

    server {
        listen       80;
        listen       [::]:80;
        server_name  _;
        root         /opt/deploy/www;

        include /home/nginx/default.d/*.conf;


        # location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        #     expires 30d; # 缓存过期时间为30天
        #     add_header Cache-Control "public"; # 设置缓存控制为公共缓存
        # }
        # location ~* \.(jpg|jpeg|png|gif|ico|mp4|webm)$ {
        #     root /opt/deploy/www/static; # 设置静态文件的根目录
        #     expires 30d; # 设置缓存过期时间为30天
        #     add_header Cache-Control "public"; # 添加缓存控制头部信息
        # }

        location / {
            gzip on;
            gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
            alias  /opt/deploy/www/blog/;
            index  index.html index.htm;
        }

        # 静态文件转发
        location /static/ {
            alias  /opt/deploy/www/static/;
            autoindex on;
            autoindex_exact_size on;
            autoindex_localtime on;
            gzip on;
            gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
            gzip_min_length 1k;
            gzip_comp_level 5;
            gzip_vary on;
            gzip_proxied any;
            gzip_disable "MSIE [1-6]\.";
        }

        error_page 404 /404.html;
        location = /404.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }
}

